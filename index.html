<!DOCTYPE html>

<html>

<head>
<title>Simulador Financeiro</title>
<link rel="stylesheet" href="style.css">


</head>
<body>
<br>
<div>
    <h2 id="titulo_site">Calculadora de CDB</h2>

    <label>Investimento Inicial</label>
    <input type="number" id="investimento_inicial">
    
    <label>Investimento Mensal</label>
    <input type="number" id="investimento_mensal">
    
    <label>Taxa do CDI</label>
    <input type="number" id="taxa_cdi">
    
    <label>Tempo de Rendimento</label>
    <input type="number" id="tempo_rendimento">
    <select id="periodo">
        <option value ="mensal">Mensal</option>
        <option value ="anual">Anual</option>
    </select>
    
    <button id="btn_calcular">Calcular</button>

</div>

<p id="texto_resultado">O resultado aparecera aqui!</p>
<script src="script.js"></script>
</body>





</html>
